<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Cipher — Cryptogram Puzzle</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#e6edf3;
  --dim:#8b949e;--accent:#58a6ff;--accent2:#3fb950;--warn:#f0883e;
  --err:#f85149;--glow:rgba(88,166,255,.15);--font:'Courier New',monospace;
}
html{font-size:16px}
body{background:var(--bg);color:var(--text);font-family:var(--font);
  min-height:100dvh;display:flex;flex-direction:column;align-items:center;
  padding:12px;-webkit-tap-highlight-color:transparent;user-select:none}
header{text-align:center;margin-bottom:16px;width:100%;max-width:720px}
h1{font-size:1.6rem;letter-spacing:.3em;color:var(--accent);margin-bottom:2px}
h1 span{color:var(--dim);font-size:.7em;letter-spacing:.1em}
.stats-bar{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;
  font-size:.75rem;color:var(--dim);margin-top:8px}
.stats-bar .val{color:var(--accent2);font-weight:bold}
#puzzle{width:100%;max-width:720px;margin-bottom:20px;line-height:2.4;
  font-size:1.15rem;letter-spacing:.05em;padding:0 4px}
.word{display:inline-block;margin:0 6px 4px 0;white-space:nowrap}
.cell{display:inline-flex;flex-direction:column;align-items:center;
  cursor:pointer;width:1.5em;position:relative;transition:background .15s}
.cell .cipher{color:var(--warn);font-size:.7em;position:absolute;top:-1em;opacity:.6}
.cell .guess{border-bottom:2px solid var(--border);min-height:1.25em;
  display:block;width:100%;text-align:center;text-transform:uppercase;
  color:var(--text);font-family:var(--font);font-size:1em;transition:color .2s,border-color .2s}
.cell.selected .guess{border-color:var(--accent);background:var(--glow)}
.cell.correct .guess{color:var(--accent2);border-color:var(--accent2)}
.cell.locked .guess{color:var(--accent2);opacity:.85}
.cell.hint .guess{color:var(--accent);border-color:var(--accent)}
.punct{display:inline;color:var(--dim);font-size:1em;vertical-align:bottom;line-height:2.4}
#keyboard{width:100%;max-width:480px;margin-bottom:16px}
.kb-row{display:flex;justify-content:center;gap:4px;margin-bottom:4px}
.key{flex:1;max-width:38px;height:42px;border:1px solid var(--border);
  border-radius:6px;background:var(--surface);color:var(--text);
  font-family:var(--font);font-size:1rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .12s,border-color .12s,opacity .2s}
.key:active{background:var(--accent);color:var(--bg)}
.key.used{opacity:.35;border-color:transparent}
.key.mapped{border-color:var(--accent2);color:var(--accent2)}
.key-action{max-width:60px;font-size:.65rem;letter-spacing:.05em;color:var(--dim)}
.controls{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:16px}
.btn{padding:8px 18px;border:1px solid var(--border);border-radius:6px;
  background:var(--surface);color:var(--dim);font-family:var(--font);
  font-size:.8rem;cursor:pointer;transition:all .15s;letter-spacing:.05em}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn.primary{border-color:var(--accent);color:var(--accent)}
#timer{font-size:.85rem;color:var(--dim);margin-bottom:12px;text-align:center}
#win-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);
  z-index:100;align-items:center;justify-content:center}
#win-overlay.show{display:flex}
#win-box{background:var(--surface);border:1px solid var(--accent2);border-radius:12px;
  padding:32px;text-align:center;max-width:400px;width:90%}
#win-box h2{color:var(--accent2);font-size:1.3rem;margin-bottom:8px}
#win-box .meta{color:var(--dim);font-size:.85rem;margin-bottom:16px;line-height:1.6}
#win-box .quote-attr{color:var(--accent);font-style:italic;margin-bottom:16px;font-size:.9rem}
.hint-count{font-size:.7rem;color:var(--warn)}
#freq-bar{width:100%;max-width:720px;margin-bottom:12px;padding:0 4px}
.freq-row{display:flex;flex-wrap:wrap;gap:2px;justify-content:center}
.freq-item{font-size:.6rem;color:var(--dim);text-align:center;width:22px}
.freq-item .bar{height:3px;background:var(--border);border-radius:2px;margin-top:1px}
.freq-item .bar .fill{height:100%;background:var(--warn);border-radius:2px;transition:width .3s}
@media(max-width:480px){
  #puzzle{font-size:1rem;line-height:2.6}
  .cell{width:1.3em}
  h1{font-size:1.2rem}
  .key{height:38px;font-size:.9rem}
}
</style>
</head>
<body>
<header>
  <h1>CIPHER <span>cryptogram</span></h1>
  <div class="stats-bar">
    <span>Solved: <span class="val" id="s-solved">0</span></span>
    <span>Streak: <span class="val" id="s-streak">0</span></span>
    <span>Best: <span class="val" id="s-best">--</span></span>
  </div>
</header>
<div id="timer">0:00</div>
<div id="freq-bar"><div class="freq-row" id="freq-row"></div></div>
<div id="puzzle"></div>
<div id="keyboard"></div>
<div class="controls">
  <button class="btn" id="btn-hint">HINT <span class="hint-count" id="hint-count">(3)</span></button>
  <button class="btn" id="btn-clear">CLEAR</button>
  <button class="btn primary" id="btn-new">NEW PUZZLE</button>
</div>
<div id="win-overlay">
  <div id="win-box">
    <h2>DECRYPTED</h2>
    <div class="quote-attr" id="win-quote"></div>
    <div class="meta" id="win-meta"></div>
    <button class="btn primary" id="btn-next">NEXT PUZZLE</button>
  </div>
</div>
<script>
const QUOTES=[
{text:"The only way to do great work is to love what you do.",attr:"Steve Jobs"},
{text:"Imagination is more important than knowledge.",attr:"Albert Einstein"},
{text:"The best way to predict the future is to invent it.",attr:"Alan Kay"},
{text:"Cryptography is the ultimate form of non violent direct action.",attr:"Julian Assange"},
{text:"Privacy is not something that I am merely entitled to it is an absolute prerequisite.",attr:"Marlon Brando"},
{text:"Mathematics is the queen of the sciences.",attr:"Carl Friedrich Gauss"},
{text:"We can only see a short distance ahead but we can see plenty there that needs to be done.",attr:"Alan Turing"},
{text:"The question of whether a computer can think is no more interesting than whether a submarine can swim.",attr:"Edsger Dijkstra"},
{text:"Talk is cheap show me the code.",attr:"Linus Torvalds"},
{text:"Any sufficiently advanced technology is indistinguishable from magic.",attr:"Arthur C. Clarke"},
{text:"The universe is under no obligation to make sense to you.",attr:"Neil deGrasse Tyson"},
{text:"In theory there is no difference between theory and practice but in practice there is.",attr:"Jan van de Snepscheut"},
{text:"Programs must be written for people to read and only incidentally for machines to execute.",attr:"Harold Abelson"},
{text:"Simplicity is the ultimate sophistication.",attr:"Leonardo da Vinci"},
{text:"If you think technology can solve your security problems then you do not understand the problems and you do not understand the technology.",attr:"Bruce Schneier"},
{text:"There are two kinds of cryptography in this world cryptography that will stop your kid sister from reading your files and cryptography that will stop major governments.",attr:"Bruce Schneier"},
{text:"The computer was born to solve problems that did not exist before.",attr:"Bill Gates"},
{text:"First solve the problem then write the code.",attr:"John Johnson"},
{text:"Measuring programming progress by lines of code is like measuring aircraft building progress by weight.",attr:"Bill Gates"},
{text:"The most dangerous phrase in the language is we have always done it this way.",attr:"Grace Hopper"},
{text:"One machine can do the work of fifty ordinary men but no machine can do the work of one extraordinary man.",attr:"Elbert Hubbard"},
{text:"It is not that I am so smart it is just that I stay with problems longer.",attr:"Albert Einstein"},
{text:"Pure mathematics is in its way the poetry of logical ideas.",attr:"Albert Einstein"},
{text:"Do not worry about your difficulties in mathematics I can assure you mine are still greater.",attr:"Albert Einstein"},
{text:"Codes and ciphers are not just for spies they are the backbone of modern commerce.",attr:"Simon Singh"},
{text:"Science is what we understand well enough to explain to a computer art is everything else we do.",attr:"Donald Knuth"},
{text:"The purpose of computing is insight not numbers.",attr:"Richard Hamming"},
{text:"Good judgement comes from experience and experience comes from bad judgement.",attr:"Fred Brooks"},
{text:"The function of good software is to make the complex appear to be simple.",attr:"Grady Booch"},
{text:"Encryption works and that is the point.",attr:"Edward Snowden"},
{text:"The enemy knows the system.",attr:"Claude Shannon"},
{text:"Information is the resolution of uncertainty.",attr:"Claude Shannon"},
{text:"The important thing is not to stop questioning curiosity has its own reason for existing.",attr:"Albert Einstein"},
{text:"A language that does not affect the way you think about programming is not worth knowing.",attr:"Alan Perlis"},
{text:"Security is always going to be a cat and mouse game because there will be people out there that are hunting for the zero day award.",attr:"Bob Iger"},
{text:"The strength of a cipher lies not in the secrecy of its mechanism but in the secrecy of its key.",attr:"Auguste Kerckhoffs"},
];

let state={quoteIdx:-1,plain:"",cipher:"",mapping:{},guesses:{},hints:new Set(),
  selectedCell:null,timerStart:0,timerInterval:null,hintsLeft:3,solved:false};
let stats=loadStats();

function loadStats(){
  try{const s=JSON.parse(localStorage.getItem("cipher-stats"));
  return s||{solved:0,streak:0,best:null,seenQuotes:[]};}
  catch(e){return{solved:0,streak:0,best:null,seenQuotes:[]};}
}
function saveStats(){localStorage.setItem("cipher-stats",JSON.stringify(stats));}
function renderStats(){
  document.getElementById("s-solved").textContent=stats.solved;
  document.getElementById("s-streak").textContent=stats.streak;
  document.getElementById("s-best").textContent=stats.best?fmtTime(stats.best):"--";
}
function fmtTime(s){const m=Math.floor(s/60);const sec=s%60;return m+":"+String(sec).padStart(2,"0");}

function generateMapping(){
  const alpha="ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
  let shuffled;
  do{shuffled=[...alpha];
    for(let i=shuffled.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[shuffled[i],shuffled[j]]=[shuffled[j],shuffled[i]];}
  }while(shuffled.some((c,i)=>c===alpha[i]));
  const map={};alpha.forEach((c,i)=>map[c]=shuffled[i]);return map;
}
function encrypt(text,mapping){
  return text.split("").map(c=>{const up=c.toUpperCase();if(mapping[up])return mapping[up];return c;}).join("");
}
function invertMap(m){const inv={};for(const[k,v]of Object.entries(m))inv[v]=k;return inv;}

function pickQuote(){
  const unseen=QUOTES.map((_,i)=>i).filter(i=>!stats.seenQuotes.includes(i));
  const pool=unseen.length>0?unseen:QUOTES.map((_,i)=>i);
  const idx=pool[Math.floor(Math.random()*pool.length)];
  if(unseen.length===0)stats.seenQuotes=[];
  stats.seenQuotes.push(idx);
  if(stats.seenQuotes.length>QUOTES.length-5)stats.seenQuotes=stats.seenQuotes.slice(-10);
  saveStats();return idx;
}

function newGame(){
  state.solved=false;state.quoteIdx=pickQuote();
  const q=QUOTES[state.quoteIdx];state.plain=q.text.toUpperCase();
  const fwd=generateMapping();state.cipher=encrypt(state.plain,fwd);
  state.mapping=invertMap(fwd);state.guesses={};state.hints=new Set();
  state.selectedCell=null;state.hintsLeft=3;
  document.getElementById("hint-count").textContent="("+state.hintsLeft+")";
  document.getElementById("win-overlay").classList.remove("show");
  startTimer();renderPuzzle();renderKeyboard();renderFreq();
}

function startTimer(){
  if(state.timerInterval)clearInterval(state.timerInterval);
  state.timerStart=Date.now();
  state.timerInterval=setInterval(()=>{
    const el=Math.floor((Date.now()-state.timerStart)/1000);
    document.getElementById("timer").textContent=fmtTime(el);
  },1000);
}
function stopTimer(){if(state.timerInterval)clearInterval(state.timerInterval);return Math.floor((Date.now()-state.timerStart)/1000);}

function renderPuzzle(){
  const container=document.getElementById("puzzle");container.innerHTML="";
  const words=[];let currentWord=[];const plainChars=QUOTES[state.quoteIdx].text.toUpperCase();
  for(let i=0;i<state.cipher.length;i++){
    const cChar=state.cipher[i];const pChar=plainChars[i];
    if(/[A-Z]/.test(cChar)){currentWord.push({idx:i,cipher:cChar,plain:pChar});}
    else{if(currentWord.length){words.push({type:"word",chars:currentWord});currentWord=[];}
      words.push({type:"punct",char:cChar===" "?"\u00A0":cChar});}
  }
  if(currentWord.length)words.push({type:"word",chars:currentWord});
  words.forEach(w=>{
    if(w.type==="punct"){
      if(w.char==="\u00A0"){container.appendChild(document.createTextNode(" "));}
      else{const sp=document.createElement("span");sp.className="punct";sp.textContent=w.char;container.appendChild(sp);}
    }else{
      const wd=document.createElement("span");wd.className="word";
      w.chars.forEach(ch=>{
        const cell=document.createElement("span");cell.className="cell";
        cell.dataset.idx=ch.idx;cell.dataset.cipher=ch.cipher;
        const cipherLabel=document.createElement("span");cipherLabel.className="cipher";cipherLabel.textContent=ch.cipher;
        const guessLabel=document.createElement("span");guessLabel.className="guess";
        if(state.hints.has(ch.cipher)){guessLabel.textContent=state.mapping[ch.cipher];cell.classList.add("hint","locked");}
        else if(state.guesses[ch.cipher]){guessLabel.textContent=state.guesses[ch.cipher];
          if(state.guesses[ch.cipher]===state.mapping[ch.cipher])cell.classList.add("correct");}
        cell.appendChild(cipherLabel);cell.appendChild(guessLabel);
        cell.addEventListener("click",()=>selectCell(ch.cipher));wd.appendChild(cell);
      });
      container.appendChild(wd);
    }
  });
}

function selectCell(cipherLetter){
  if(state.solved)return;if(state.hints.has(cipherLetter))return;
  state.selectedCell=cipherLetter;
  document.querySelectorAll(".cell").forEach(c=>{
    c.classList.toggle("selected",c.dataset.cipher===cipherLetter);
  });
}

function renderKeyboard(){
  const kb=document.getElementById("keyboard");kb.innerHTML="";
  const rows=["QWERTYUIOP","ASDFGHJKL","ZXCVBNM"];
  const usedValues=new Set(Object.values(state.guesses));
  rows.forEach((row,ri)=>{
    const rowDiv=document.createElement("div");rowDiv.className="kb-row";
    if(ri===2){const del=document.createElement("button");del.className="key key-action";
      del.textContent="DEL";del.addEventListener("click",handleDelete);rowDiv.appendChild(del);}
    row.split("").forEach(letter=>{
      const key=document.createElement("button");key.className="key";key.textContent=letter;
      key.dataset.letter=letter;if(usedValues.has(letter))key.classList.add("mapped");
      key.addEventListener("click",()=>handleKeyPress(letter));rowDiv.appendChild(key);
    });
    if(ri===2){const enter=document.createElement("button");enter.className="key key-action";
      enter.textContent="OK";enter.addEventListener("click",checkWin);rowDiv.appendChild(enter);}
    kb.appendChild(rowDiv);
  });
}

function handleKeyPress(letter){
  if(state.solved||!state.selectedCell)return;
  const cipherLetter=state.selectedCell;if(state.hints.has(cipherLetter))return;
  for(const[k,v]of Object.entries(state.guesses)){if(v===letter&&k!==cipherLetter)delete state.guesses[k];}
  state.guesses[cipherLetter]=letter;
  renderPuzzle();renderKeyboard();renderFreq();selectCell(cipherLetter);
  autoAdvance(cipherLetter);checkWin();
}

function handleDelete(){
  if(state.solved||!state.selectedCell)return;
  if(state.hints.has(state.selectedCell))return;
  delete state.guesses[state.selectedCell];
  renderPuzzle();renderKeyboard();renderFreq();selectCell(state.selectedCell);
}

function autoAdvance(currentCipher){
  const seen=new Set();const order=[];
  for(const ch of state.cipher){if(/[A-Z]/.test(ch)&&!seen.has(ch)){order.push(ch);seen.add(ch);}}
  const curIdx=order.indexOf(currentCipher);
  for(let i=1;i<order.length;i++){
    const next=order[(curIdx+i)%order.length];
    if(!state.guesses[next]&&!state.hints.has(next)){selectCell(next);return;}
  }
}

function renderFreq(){
  const row=document.getElementById("freq-row");row.innerHTML="";
  const freq={};let max=0;
  for(const ch of state.cipher){if(/[A-Z]/.test(ch)){freq[ch]=(freq[ch]||0)+1;max=Math.max(max,freq[ch]);}}
  const sorted=Object.entries(freq).sort((a,b)=>b[1]-a[1]);
  sorted.forEach(([letter,count])=>{
    const item=document.createElement("div");item.className="freq-item";
    const guess=state.guesses[letter]||(state.hints.has(letter)?state.mapping[letter]:"");
    item.innerHTML='<div>'+letter+(guess?"\u2192"+guess:"")+'</div><div class="bar"><div class="fill" style="width:'+(count/max*100)+'%"></div></div>';
    row.appendChild(item);
  });
}

function giveHint(){
  if(state.solved||state.hintsLeft<=0)return;
  const candidates=Object.keys(state.mapping).filter(c=>{
    if(state.hints.has(c))return false;if(!state.cipher.includes(c))return false;
    return!state.guesses[c]||state.guesses[c]!==state.mapping[c];});
  if(!candidates.length)return;
  const pick=candidates[Math.floor(Math.random()*candidates.length)];
  state.hints.add(pick);state.guesses[pick]=state.mapping[pick];state.hintsLeft--;
  document.getElementById("hint-count").textContent="("+state.hintsLeft+")";
  renderPuzzle();renderKeyboard();renderFreq();checkWin();
}

function clearGuesses(){
  if(state.solved)return;
  for(const k of Object.keys(state.guesses)){if(!state.hints.has(k))delete state.guesses[k];}
  state.selectedCell=null;renderPuzzle();renderKeyboard();renderFreq();
}

function checkWin(){
  const uniqueCipher=new Set();
  for(const ch of state.cipher){if(/[A-Z]/.test(ch))uniqueCipher.add(ch);}
  for(const c of uniqueCipher){if(state.guesses[c]!==state.mapping[c])return;}
  state.solved=true;const elapsed=stopTimer();
  stats.solved++;stats.streak++;
  if(stats.best===null||elapsed<stats.best)stats.best=elapsed;
  saveStats();renderStats();
  document.querySelectorAll(".cell").forEach(c=>c.classList.add("correct"));
  const q=QUOTES[state.quoteIdx];
  document.getElementById("win-quote").textContent='"'+q.text+'" \u2014 '+q.attr;
  document.getElementById("win-meta").innerHTML='Time: '+fmtTime(elapsed)+'<br>Hints used: '+(3-state.hintsLeft)+'<br>Streak: '+stats.streak;
  setTimeout(()=>document.getElementById("win-overlay").classList.add("show"),600);
}

document.addEventListener("keydown",e=>{
  if(state.solved)return;const key=e.key.toUpperCase();
  if(/^[A-Z]$/.test(key)){handleKeyPress(key);}
  else if(e.key==="Backspace"||e.key==="Delete"){handleDelete();}
  else if(e.key==="Tab"){e.preventDefault();if(state.selectedCell)autoAdvance(state.selectedCell);}
});

document.getElementById("btn-hint").addEventListener("click",giveHint);
document.getElementById("btn-clear").addEventListener("click",clearGuesses);
document.getElementById("btn-new").addEventListener("click",newGame);
document.getElementById("btn-next").addEventListener("click",newGame);
renderStats();newGame();
</script>
</body>
</html>
